---
name: "Pipeline: Release"

on:
  release:
    types: [created]

env:
  IMAGE_TAG_EDGE: ${{ vars.IMAGE_TAG_EDGE }}
  IMAGE_TAG_LATEST: ${{ vars.IMAGE_TAG_LATEST }}
  REGISTRY: docker.io
  DOCS_PAGES_ARTIFACT: docs-page

jobs:

  update-release-notes:
    uses: sommerfeld-io/.github/.github/workflows/release.yml@main
    permissions:
      contents: write

  generate-release-intro:
    runs-on: ubuntu-latest
    needs: update-release-notes
    permissions:
      contents: write
      models: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot
        shell: bash
      - name: Show versions
        run: |
          gh --version
          copilot --version
        shell: bash
      - name: Generate release intro via GitHub Copilot CLI
        id: generate-intro
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          PROMPT: |
            Inspect all GitHub commits between the second-to-last git tag and the latest git tag. The latest tag already represents the current released version.

            This commit range represents the changes included in the most recent release.

            Your task is to write a short, high-level release description that documents this release after it has been created.

            Requirements:
            - Do NOT use marketing or promotional language.
            - Do NOT write as a pre-release announcement.
            - Keep it high-level: explain what changed and what behavior users can now expect, without walking through individual commits or implementation details.
            - Focus on factual, user-facing behavior changes introduced in this release.
            - Describe what changed from the user's perspective and what behavior they can now expect.
            - Only include information that can reasonably be derived from commits in the given tag range.
            - Do NOT speculate beyond the changes in the commits.
            - Do NOT use bullet points, ordered lists, or tables. The output must be written as one or more coherent paragraphs.
            - Produce exactly ONE variant of the release description.
            - Output must be valid Markdown.

            Output constraints:
            - Output ONLY the release description.
            - No preamble, no explanations, no commentary.
            - Do NOT reference files, templates, workflows, or writing destinations.
            - Do NOT write to any file.
            - End cleanly with a single trailing newline (exactly one blank line at the end of the document).
        run: |
          set -euo pipefail
          if copilot --allow-all --silent --prompt "$PROMPT" > intro.md && [ -s intro.md ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "[WARN] GitHub Copilot CLI did not produce a release intro (e.g. Copilot budget exhausted). Skipping intro text." >&2
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: Prepend intro to release notes
        if: steps.generate-intro.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ github.event.release.tag_name }}"
          INTRO=$(cat intro.md)
          CURRENT_BODY=$(gh release view "$CURRENT_TAG" --json body --jq '.body')
          NEW_BODY="${INTRO}"$'\n\n'"${CURRENT_BODY}"

          gh release edit "$CURRENT_TAG" --notes "${NEW_BODY}"
        shell: bash

  docs-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          ref: ${{github.ref}}
      - name: Build docs page
        run: docker compose up docs-build
        shell: bash
      - name: List contents
        run: ls -alF target/docs/site
        shell: bash
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          name: ${{ env.DOCS_PAGES_ARTIFACT }}
          path: target/docs/site

  docs-deploy:
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      contents: read
      pages: write
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: ${{ env.DOCS_PAGES_ARTIFACT }}

  publish-release:
    runs-on: ubuntu-latest
    name: ${{ matrix.image-name }}${{ matrix.tag-suffix }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - image-name: devcontainer
            tag-suffix: ''
          - image-name: folderslint
            tag-suffix: ''
          - image-name: ftp-client
            tag-suffix: ''
          - image-name: mkdocs
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: serve
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: pdf
            tag-suffix: -pdf
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Deploy to DockerHub
        id: deploy
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          IMAGE_NAME: ${{ matrix.image-name }}
          IMAGE_TAG_EDGE: ${{ env.IMAGE_TAG_EDGE }}
          IMAGE_TAG_LATEST: ${{ env.IMAGE_TAG_LATEST }}
          TAG_SUFFIX: ${{ matrix.tag-suffix }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          echo "[INFO] New version tag = $TAG"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          SRC_IMAGE="$DOCKERHUB_USER/$IMAGE_NAME:$IMAGE_TAG_EDGE$TAG_SUFFIX"

          TARGET_IMAGE="$DOCKERHUB_USER/$IMAGE_NAME:$TAG$TAG_SUFFIX"
          docker buildx imagetools create --tag "$TARGET_IMAGE" "$SRC_IMAGE"

          TARGET_IMAGE="$DOCKERHUB_USER/$IMAGE_NAME:$IMAGE_TAG_LATEST$TAG_SUFFIX"
          docker buildx imagetools create --tag "$TARGET_IMAGE" "$SRC_IMAGE"
        shell: bash
      - name: Verify SBOM attestation survived retag to version tag
        uses: ./.github/actions/verify-sbom
        with:
          image-ref: ${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}:${{ steps.deploy.outputs.version }}${{ matrix.tag-suffix }}
      - name: Verify SBOM attestation survived retag to :${{ env.IMAGE_TAG_LATEST }}
        uses: ./.github/actions/verify-sbom
        with:
          image-ref: ${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}:${{ env.IMAGE_TAG_LATEST }}${{ matrix.tag-suffix }}
      - name: Update DockerHub description
        if: ${{ matrix.tag-suffix == '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: components/${{ matrix.image-name }}/README.md

  upload-sbom:
    runs-on: ubuntu-latest
    name: ${{ matrix.image-name }}${{ matrix.tag-suffix }}
    needs: publish-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - image-name: devcontainer
            tag-suffix: ''
          - image-name: folderslint
            tag-suffix: ''
          - image-name: ftp-client
            tag-suffix: ''
          - image-name: mkdocs
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: serve
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: pdf
            tag-suffix: -pdf
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version from release tag
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Verify and extract the exact SBOM attestation from the published image
        id: sbom
        uses: ./.github/actions/verify-sbom
        with:
          image-ref: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}:${{ steps.release.outputs.version }}${{ matrix.tag-suffix }}
      - name: Rename SBOM files for release asset naming
        id: rename
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          IMAGE_NAME: ${{ matrix.image-name }}
          TAG_SUFFIX: ${{ matrix.tag-suffix }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          AMD64_DEST="${DOCKERHUB_USER}-${IMAGE_NAME}${TAG_SUFFIX}_${VERSION}.spdx.json"
          ARM64_DEST="${DOCKERHUB_USER}-${IMAGE_NAME}${TAG_SUFFIX}_${VERSION}.linux-arm64.spdx.json"
          mv "${{ steps.sbom.outputs.amd64-sbom-file }}" "$AMD64_DEST"
          mv "${{ steps.sbom.outputs.arm64-sbom-file }}" "$ARM64_DEST"
          echo "amd64_dest=$AMD64_DEST" >> "$GITHUB_OUTPUT"
          echo "arm64_dest=$ARM64_DEST" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Upload SBOMs as GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.rename.outputs.amd64_dest }}" \
            "${{ steps.rename.outputs.arm64_dest }}" \
            --clobber
        shell: bash

  docker-scout:
    name: ${{ matrix.image-name }}${{ matrix.tag-suffix }}
    runs-on: ubuntu-latest
    needs: publish-release
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - image-name: devcontainer
            tag-suffix: ''
          - image-name: folderslint
            tag-suffix: ''
          - image-name: ftp-client
            tag-suffix: ''
          - image-name: mkdocs
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: serve
            tag-suffix: ''
          - image-name: revealjs
            dockerfile-stage: pdf
            tag-suffix: -pdf
    steps:
      # - name: Checkout code
      #   uses: actions/checkout@v4
      - name: Get current date
        id: date
        run: echo "job_date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Scout - CVE Scan
        uses: docker/scout-action@v1.23.0
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}:${{ env.IMAGE_TAG_LATEST }}${{ matrix.tag-suffix }}
          sarif-file: sarif-output.json
          summary: false
          organization: ${{ secrets.DOCKERHUB_USER }}
      - name: Upload SARIF result
        id: upload-sarif
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-output.json
          category: 'Docker Scout CVEs - ${{ secrets.DOCKERHUB_USER }}/${{ matrix.image-name }}:${{ env.IMAGE_TAG_LATEST }}${{ matrix.tag-suffix }}'
          checkout_path: components/${{ matrix.image-name }}
