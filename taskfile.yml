---
version: '3.42.1'

dotenv: ['.env']

vars:
  REPO: https://raw.githubusercontent.com/sommerfeld-io/.github

includes:
  cleanup: .task/cleanup/taskfile.yml
  common: .task/common/taskfile.yml
  copilot: .github/skills/taskfile.yml
  revealjs: components/revealjs/taskfile.yml

tasks:

  info:
    desc: 'Print environment info (OS, Node, Git, Python)'
    cmds:
      - lsb_release -a
      - node --version
      - git version
      - python3 --version
      - pip3 --version

  symlinks:
    desc: Create symlinks for shared files
    cmds:
      - ln -sf "$(pwd)/.github/copilot-instructions.md" "$(pwd)/CLAUDE.md"

  cleanup:inspec:
    desc: Cleanup the inspec profiles and lock files
    cmds:
      - for: &inspec-profiles ['devcontainer', 'ftp-client', 'revealjs']
        cmd: |
          sudo rm -rf components/{{ .ITEM }}/test/inspec/vendor
          sudo rm -rf components/{{ .ITEM }}/test/inspec/inspec.lock

  # ===============================================================================================

  lint:
    desc: 'Run all project linters outside of Dockerfile linters'
    cmds:
      - task: cleanup:inspec
      - task: cleanup:filesystem
      - task: symlinks
      - for: ['yaml', 'workflows', 'filenames', 'folders', 'markdown-links']
        cmd: docker compose up lint-{{ .ITEM }} --exit-code-from lint-{{ .ITEM }}
      - for: &images ['devcontainer', 'folderslint', 'ftp-client', 'mkdocs', 'revealjs']
        task: lint:dockerfile
        vars: { IMAGE: '{{ .ITEM }}' }

  lint:dockerfile:
    internal: true
    vars:
      IMAGE: '{{ .IMAGE }}'
    cmds:
      - docker compose up {{ .IMAGE }}-lint-dockerfile --exit-code-from {{ .IMAGE }}-lint-dockerfile

  inspec:check:
    desc: 'Vendor and check InSpec profile validity'
    cmds:
      - task: cleanup:inspec
      - for: *inspec-profiles
        task: inspec:check:{{ .ITEM }}

  inspec:check:*:
    desc: 'Vendor and check InSpec profile validity'
    vars:
      PROFILE: '{{ index .MATCH 0 }}'
    cmds:
      - task: cleanup:inspec
      - rm -f "components/{{ .PROFILE }}/test/inspec/inspec.lock"
      - docker compose run --rm inspec vendor "components/{{ .PROFILE }}/test/inspec" --overwrite --chef-license=accept
      - docker compose run --rm inspec check "components/{{ .PROFILE }}/test/inspec" --chef-license=accept

  # ===============================================================================================

  docs:generate:
    desc: 'Generate Markdown files for documentation'
    cmds:
      - echo "Collecting documentation from other Markdown files ..."
      - mkdir -p docs/container-images
      - task: common:copy
        vars: { SRC: docs/index.md, DEST: README.md }
      - task: common:copy
        vars: { SRC: docs/license.md, DEST: LICENSE.md }
      - for: *images
        task: common:copy
        vars: { SRC: "components/{{ .ITEM }}/README.md", DEST: "docs/container-images/{{ .ITEM }}.md" }

  docs:run:
    desc: 'Run the documentation server'
    cmds:
      - task: docs:generate
      - docker compose up docs-dev-server

  # ===============================================================================================

  build:
    desc: 'Lint and build all container images'
    cmds:
      - for: *images
        task: build:{{ .ITEM }}

  build:*:
    desc: 'Lint and build container image | Replace * with image name (not path)'
    vars:
      IMAGE: '{{ index .MATCH 0 }}'
    cmds:
      - task: lint:dockerfile
        vars: { IMAGE: '{{ .IMAGE }}' }
      - docker compose build {{ .IMAGE }}

  # ===============================================================================================

  run:revealjs:
    desc: 'Build the revealjs image and serve the demo presentation'
    cmds:
      - task: build:revealjs
      - task: revealjs:serve

  run:revealjs-pdf:
    desc: 'Build the revealjs-pdf image and export the demo presentation to PDF'
    cmds:
      - task: build:revealjs-pdf
      - task: revealjs:pdf

  # ===============================================================================================

  test:
    desc: 'Test all container images'
    cmds:
      - for: *inspec-profiles
        task: test:{{ .ITEM }}

  test:*:
    desc: 'Test container image | Replace * with image name'
    vars:
      IMAGE: '{{ index .MATCH 0 }}'
    cmds:
      - docker run --name "system-under-test-{{ .IMAGE }}" -d --entrypoint sleep -v "$(pwd):$(pwd):ro" -w "$(pwd)" "local/{{ .IMAGE }}:dev" 180s
      - sleep 5
      - docker compose run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd):$(pwd)" -w "$(pwd)" inspec exec "components/{{ .IMAGE }}/test/inspec" --target "docker://system-under-test-{{ .IMAGE }}" --no-distinct-exit --chef-license=accept
      - sleep 5
      - docker stop "system-under-test-{{ .IMAGE }}"
      - docker rm "system-under-test-{{ .IMAGE }}"
